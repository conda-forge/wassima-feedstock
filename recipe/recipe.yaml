schema_version: 1

context:
  name: wassima
  version: "2.1.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/wassima-${{ version }}.tar.gz
  sha256: 709f375c778d9be84568d802d1e1b62a2ed3942b1fa4c83830533a69cf36c243

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling >=1.6.0,<2
    - pip
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - wassima
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Access your OS root certificates with the atmost ease
  license: MIT
  license_file:
    - LICENSE
  homepage: https://github.com/jawah/wassima

extra:
  recipe-maintainers:
    - thewchan
